<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Factory</title>
<style>
  @font-face {
    font-family: 'Inter';
    src: local('Inter');
  }
  :root {
    --bg: #0a0a0b;
    --surface: #131316;
    --border: #26262b;
    --accent: #5e6ad2;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: #e4e4e7;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2.5rem;
    text-align: center;
    max-width: 90vw;
  }
  h1 {
    margin: 0 0 0.5rem;
    font-size: 1.5rem;
    font-weight: 600;
  }
  p {
    margin: 0;
    color: #9a9aa2;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
  }
  .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 8px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
</style>
</head>
<body>
  <div class="card">
    <h1><span class="dot"></span>Content Factory</h1>
    <p>Deploy confirmed</p>
  </div>
</body>
</html>
